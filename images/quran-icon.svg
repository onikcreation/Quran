<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rehal (wooden stand) -->
  <g fill="#7B3A10">
    <!-- Left leg -->
    <rect x="18" y="62" width="10" height="28" rx="3" transform="rotate(-18,23,76)"/>
    <!-- Right leg -->
    <rect x="72" y="62" width="10" height="28" rx="3" transform="rotate(18,77,76)"/>
    <!-- Cross bar -->
    <rect x="20" y="74" width="60" height="8" rx="3"/>
    <!-- Book rest top bar -->
    <rect x="22" y="54" width="56" height="10" rx="3"/>
  </g>
  <!-- Open Quran book -->
  <g>
    <!-- Left page -->
    <path d="M22 18 Q30 14 50 18 L50 58 Q30 54 22 58 Z" fill="#FFF8EC" stroke="#E8C97A" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M78 18 Q70 14 50 18 L50 58 Q70 54 78 58 Z" fill="#FFF8EC" stroke="#E8C97A" stroke-width="1.5"/>
    <!-- Spine -->
    <rect x="48" y="17" width="4" height="42" rx="1" fill="#D4A855"/>
    <!-- Left page lines -->
    <line x1="30" y1="28" x2="47" y2="27" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="34" x2="47" y2="33" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="47" y2="39" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="46" x2="47" y2="45" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="53" y1="27" x2="70" y2="28" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="53" y1="33" x2="70" y2="34" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="53" y1="39" x2="70" y2="40" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="53" y1="45" x2="70" y2="46" stroke="#C8B08A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Bookmark ribbon -->
    <path d="M36 14 L36 32 L40 28 L44 32 L44 14 Z" fill="#8B1C1C"/>
  </g>
</svg>
